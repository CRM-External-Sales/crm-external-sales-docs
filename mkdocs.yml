
site_name: CRM venta interna y externa- Hotel Río Perdido 
site_description: Manual técnico del CRM de ventas internas y externas .
copyright: Copyright &copy; 2026 CRM External Sales

repo_url: https://github.com/CRM-External-Sales/crm-external-sales-docs.git
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: crm
      accent: rio
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: crm
      accent: rio
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Inicio: index.md
  - Backend:
      - backend/arquitectura.md
      - backend/estructura.md
      - backend/requerimientos.md
      - backend/instalacion.md
      - backend/base-de-datos.md
      - backend/api-router.md
      - backend/variables-entorno.md
      - backend/utilidades.md
      - Módulos:
          - backend/modulos/autenticacion.md
          - backend/modulos/usuarios.md
          - backend/modulos/tours.md
          - backend/modulos/transfers.md
          - backend/modulos/proveedores.md
          - backend/modulos/reservas.md
          - backend/modulos/reportes.md
          - backend/modulos/operaciones.md
  - Frontend:
      - frontend/estructura.md
      - frontend/requerimientos.md
      - frontend/instalacion.md
      - frontend/rutas.md
      - frontend/servicios.md
      - frontend/hooks.md
      - frontend/componentes.md
      - Módulos: frontend/modulos/index.md
      - frontend/panel-interno.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-theme.js
  - javascripts/modulos-toc.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CRM-External-Sales/crm-external-sales.git
      name: Repositorio de la aplicación
